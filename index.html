<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">

  <!-- Noto -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="./css/style.css">

  <title>Sky News｜空島新聞</title>
</head>

<body>

<div class="layout">

  <aside class="sidebar">

    <div class="nav">

      <div>市場觀測</div>

    <article id="content" class="content"></article>

    <footer class="footer">

      <button id="nextBtn">下一天</button>
